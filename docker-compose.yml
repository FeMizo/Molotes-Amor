services:
  db:
    image: postgres:16
    container_name: molotes-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: molotes
      POSTGRES_USER: molotes
      POSTGRES_PASSWORD: molotes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U molotes -d molotes"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
